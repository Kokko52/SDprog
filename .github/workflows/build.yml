name: Build EXE

on: [push]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt
      - run: pip install pyinstaller

      - run: pip install pyautogui numpy && pyinstaller --clean --noconfirm --onefile --collect-all cv2 main.py
      - uses: actions/upload-artifact@v4
        with:
          name: program
          path: dist/main.exe
